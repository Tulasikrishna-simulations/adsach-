// ── FULL MATH ENGINE (PAVE-C v2.0) ───────────────────────────────────────────
const ME={
  lps(text){
    const sents=text.split(/[.!?]+/).map(s=>s.trim()).filter(s=>s.length>5);
    const n=sents.length||1; const W=text.split(/\s+/).filter(Boolean).length||1;
    let wS=0,wT=0;
    sents.forEach((s,idx)=>{
      const i=idx+1,sl=s.toLowerCase(),sw=sl.split(/\s+/).filter(Boolean);
      const modal=/\bmust\b|\bneed to\b|\bhave to\b/.test(sl)?0.95:/\bshould\b/.test(sl)?0.65:/\bcould\b|\bmight\b/.test(sl)?0.25:0;
      const imp=/^(buy|get|try|order|act|grab|claim|hurry|rush|unlock|save|join|don'?t|never)\b/i.test(s.trim())?1:0;
      const neg=Math.min(1,(s.match(/don'?t miss|never again|no more|last chance|now or never/gi)||[]).length*0.4);
      const you=Math.min(1,(sw.filter(w=>/^(you|your|yourself|you're|you've)$/i.test(w)).length/sw.length)*8);
      const sc=0.30*modal+0.30*imp+0.20*neg+0.20*you;
      const wp=n>1?1+0.4*(1-(i-1)/(n-1)):1.4;
      wS+=sc*wp;wT+=wp;
    });
    return Math.min(1,wS/(wT||1));
  },
  _sp(text){
    return (text.match(/\d+\.?\d*\s*(g|mg|kg|ml|l|%|kcal|cal|oz|lb|cm|days?|weeks?|months?|hours?)\b/gi)||[]).length
      +(text.match(/\d+\s*percent/gi)||[]).length
      +(text.match(/\d+x|\d+\s*times?\b/gi)||[]).length;
  },
  edv(text){
    const tl=text.toLowerCase(),W=text.split(/\s+/).filter(Boolean).length||1,sc=50;
    const dims={
      fear:  {t:["risk","danger","threat","warning","expire","miss","lose","urgent","afraid","harm"],ρ:0.15},
      desire:{t:["want","love","dream","perfect","beautiful","stunning","irresistible","crave","wish"],ρ:0.12},
      guilt: {t:["regret","shame","fault","blame","wasted","missed","failed","let down","disappoint"],ρ:0.18},
      excite:{t:["wow","exciting","thrill","awesome","fantastic","epic","incredible","electrify"],ρ:0.10},
      loss:  {t:["lose","loss","gone","miss out","running out","sold out","only left","expires"],ρ:0.20},
      pride: {t:["exclusive","elite","premium","luxury","vip","select","chosen","worthy","distinguished"],ρ:0.13},
      envy:  {t:["others","everyone else","they have","join","don't be left","while others"],ρ:0.17},
    };
    const vec={};
    for(const [k,{t,ρ}] of Object.entries(dims)){
      const m=t.filter(term=>tl.includes(term)).length;
      vec[k]=Math.min(1,(m/W)*ρ*sc);
    }
    const mag=Math.min(1,Math.sqrt(Object.values(vec).reduce((s,v)=>s+v*v,0)));
    const sp=this._sp(text);
    const eDims=Object.values(vec).filter(v=>v>0.05).length;
    const va=Math.min(1,sp/Math.max(1,eDims*0.5));
    return{vec,mag,va,emi:mag*(1-va)};
  },
  sec(text){
    const tl=text.toLowerCase();
    const cats=[
      {terms:["absolutely","completely","perfectly","flawlessly","utterly","totally"],sc:0.8},
      {terms:["best","greatest","ultimate","world-class","finest","leading","number one"],sc:0.7},
      {terms:["amazing","incredible","revolutionary","breakthrough","extraordinary","phenomenal","life-changing"],sc:0.5},
      {terms:["unlike anything","beyond comparison","never seen before","one of a kind"],sc:0.9},
    ];
    let sw=0;const fired=[];
    for(const{terms,sc}of cats){for(const t of terms){
      const e=t.replace(/[.*+?^${}()|[\]\\]/g,'\\$&');
      const n=(tl.match(new RegExp(e,'g'))||[]).length;
      if(n){sw+=n*sc;fired.push({t,n,sc});}
    }}
    sw+=(text.match(/\b#?1\b|no\.?\s*1\b/gi)||[]).length*0.7;
    const sp=this._sp(text);
    const raw=sw/Math.max(sp,1);
    return{raw,norm:Math.min(1,raw/5),sw,sp,fired};
  },
  hpsi(text){
    const tl=text.toLowerCase(),K=6,Hmax=Math.log2(K);
    const techs=[
      {name:"Urgency",    dp:0.35,tr:["hurry","now","today only","limited time","act now","expires","deadline","flash sale"]},
      {name:"Scarcity",   dp:0.30,tr:["only left","limited","selling out","few remaining","last chance","almost gone"]},
      {name:"FOMO",       dp:0.40,tr:["don't miss","everyone","others are","missing out","while you can","before it's gone"]},
      {name:"Authority",  dp:0.20,tr:["expert","doctor","certified","proven","scientifically","clinically","dermatologist"]},
      {name:"SocialProof",dp:0.15,tr:["thousands","customers love","rated","reviews","best seller","5 stars","trusted by"]},
      {name:"Reciprocity",dp:0.15,tr:["free","gift","bonus","complimentary","no charge","on us"]},
    ];
    let pBuy=1/K;const act=[];
    for(const t of techs){
      const hits=t.tr.filter(tr=>tl.includes(tr)).length;
      const a=Math.min(1,hits/2);
      if(a>0){pBuy=Math.min(0.92,pBuy+t.dp*a);act.push({name:t.name,a,dp:t.dp});}
    }
    const pO=Math.max(0,(1-pBuy)/(K-1));
    const H=-[pBuy,...Array(K-1).fill(pO)].reduce((s,p)=>s+(p>1e-10?p*Math.log2(p):0),0);
    return{score:Math.max(0,Math.min(1,1-H/Hmax)),act,pBuy};
  },
  pi(text){
    const tl=text.toLowerCase(),words=text.split(/\s+/);
    const techs=[
      {name:"Urgency",    w:0.22,tr:["hurry","now","today only","limited time","act now","expires"]},
      {name:"Scarcity",   w:0.20,tr:["only left","limited","selling out","last chance","almost gone"]},
      {name:"FOMO",       w:0.25,tr:["don't miss","everyone","missing out","while you can"]},
      {name:"Authority",  w:0.15,tr:["expert","doctor","certified","proven","scientifically"]},
      {name:"SocialProof",w:0.12,tr:["thousands","customers love","rated","reviews","best seller"]},
      {name:"Reciprocity",w:0.10,tr:["free","gift","bonus","complimentary","no charge"]},
    ];
    let prod=1;const bd=[];
    for(const t of techs){
      const p=Math.min(1,t.tr.filter(tr=>tl.includes(tr)).length/2);
      prod*=(1-t.w*p);if(p>0)bd.push({name:t.name,p,w:t.w,c:t.w*p});
    }
    const base=1-prod;
    let firstU=words.length;
    for(let i=0;i<words.length;i++){if(["hurry","now","today","expires","limited","act","deadline"].some(u=>words[i].toLowerCase().includes(u))){firstU=i;break;}}
    return{base,eff:Math.min(1,base*(1+0.3*(1-firstU/words.length))),bd};
  },
  vi(text){
    const ss=text.split(/[.!?;]+/).map(s=>s.trim()).filter(s=>s.length>8);
    const list=ss.length?ss:[text];let tot=0;
    for(const s of list){
      const hasN=/\d/.test(s),hasU=/\b(g|mg|%|ml|kg|kcal|cal|cm|days?|weeks?)\b/i.test(s);
      const hasPct=/\d+\s*percent/i.test(s);
      const vague=/(amazing|incredible|best|great|revolutionary|ultimate|proven|guaranteed)/i.test(s);
      const hedged=/\b(may|might|could|typically|often|approximately|about)\b/i.test(s);
      const sp=(hasN&&(hasU||hasPct))?1.0:hasN?0.65:vague?0.15:hedged?0.35:0.50;
      tot+=(vague?0.25:hedged?0.6:0.80)*sp;
    }
    return Math.min(1,tot/list.length);
  },
  as(text){
    const w=text.toLowerCase().split(/\s+/).filter(Boolean),W=w.length||1;
    const sp=Math.min(1,this._sp(text)/3);
    const hg=Math.min(1,w.filter(x=>/^(may|might|could|typically|often|approximately|about)$/.test(x)).length/W*20);
    const ab=w.filter(x=>/^(always|never|guaranteed|definitely|certainly|absolutely|perfect)$/.test(x)).length;
    return Math.max(0,Math.min(1,0.5*sp+0.3*hg+0.3-Math.min(0.4,ab/W*15)));
  },
  clf(text){
    const W=text.split(/\s+/).filter(Boolean).length||1;
    const sents=text.split(/[.!?]+/).filter(Boolean);
    const exc=(text.match(/!/g)||[]).length,caps=(text.match(/\b[A-Z]{2,}\b/g)||[]).length;
    const io=Math.min(1,W/150),it=Math.min(1,((exc+caps)/W)*8);
    return Math.min(1,0.35*io+0.45*it+0.20*Math.min(1,W/(sents.length||1)/25));
  },
  analyze(text){
    if(!text.trim())return null;
    const lpsV=this.lps(text),edvR=this.edv(text),secR=this.sec(text);
    const hpsiR=this.hpsi(text),piR=this.pi(text),viV=this.vi(text);
    const asV=this.as(text),clfV=this.clf(text);
    const mpi=Math.min(1,piR.eff*(1+0.3*lpsV+0.2*secR.norm));
    const drs=Math.min(1,0.28*mpi+0.22*(1-viV)+0.18*(1-asV)+0.18*hpsiR.score+0.14*secR.norm);
    const cbf=(edvR.mag+clfV)/2;
    const ts=Math.max(1,Math.round((1-drs)*(1-cbf)*100));
    return{lps:lpsV,edv:edvR,sec:secR,hpsi:hpsiR,pi:piR,vi:viV,as:asV,clf:clfV,mpi,drs,cbf,ts};
  },
  ate({mA,mC,cA,cC,fA,fC,pA,pC,poA,poC,scans,viVar,auFail,custConf}){
    const v=[mA/250,cA/800,fA/10,1-Math.min(1,pA/12),poA/500];
    const c=[mC/250,cC/800,fC/10,1-Math.min(1,pC/12),poC/500];
    const delta=Math.sqrt(v.reduce((s,vi,i)=>s+(vi-c[i])**2,0));
    const d20=Math.sqrt(5)*0.2,lam=Math.log(2)/d20;
    const alpha=Math.exp(-lam*delta);
    const T=100*(1-Math.exp(-alpha*scans/80));
    const s1=Math.max(0.01,viVar),s2=0.10,s3=0.15;
    const inv=1/s1+1/s2+1/s3;
    const w1=(1/s1)/inv,w2=(1/s2)/inv,w3=(1/s3)/inv;
    const viP=Math.max(0,1-delta/(Math.sqrt(5)*0.5));
    const drs=Math.min(1,0.33*Math.min(1,viVar/0.5)+0.33*auFail+0.33*(1-custConf));
    const raw=w1*viP+w2*custConf-w3*drs;
    const tsF=raw*(T/100);
    const score=Math.round(Math.max(0,Math.min(100,100/(1+Math.exp(-8*(tsF-0.5))))));
    return{delta,lambda:lam,alpha,T,w1,w2,w3,viP,drs,raw,tsF,score};
  },
  unified(ate,nti){
    const uti=ate*(nti/100),aid=ate*(1-nti/100);
    const quad=ate>=50&&nti>=35?"I":ate>=50&&nti<35?"II":ate<50&&nti>=35?"III":"IV";
    return{uti,aid,quad};
  }
};

async function callClaude(adText,kidMode,apiKey){
  if(!apiKey)throw new Error("NO_KEY");

  const res=await fetch("https://api.anthropic.com/v1/messages",{
    method:"POST",

    body:JSON.stringify({model:"claude-sonnet-4-20250514",max_tokens:900,messages:[{role:"user",content:
`Advertising honesty analyst, Indian context. Analyze this ad.

AD: "${adText.substring(0,500)}"

JSON only, zero markdown:

function ATEEngine({onScore}){

    const s=i/59*800;return{s,t:100*(1-Math.exp(-r.alpha*s/80))};
  }),[r.alpha]);
  const sW=280,sH=88,pL=28,pB=14,pT=6;

                <div style={{fontFamily:C.mono,fontSize:8,color:C.cyan,letterSpacing:"0.2em",marginBottom:8}}>🤔 THINK ABOUT THIS</div>
                <p style={{fontSize:13,color:C.text,lineHeight:1.8,margin:0}}>{s.think}</p>
              </div>
            </div>
          )}
        </div>
      ))}
      <div style={{padding:20,background:C.purple+"12",border:`1px solid ${C.purple}30`,borderRadius:14,textAlign:"center"}}>
        <div style={{fontSize:24,marginBottom:10}}>🌟</div>
        <p style={{fontSize:13,color:C.text,lineHeight:1.85,margin:"0 auto",maxWidth:520}}>
          You don't have to stop watching ads or stop liking things.<br/>
          Just remember: <strong style={{color:C.purple}}>the best question is always "really?"</strong><br/><br/>
          "This drink makes you a champion — <em>really?</em>"<br/>
          "This hero uses this product — <em>really?</em>"<br/>
          "This food looks exactly like that — <em>really?</em>"<br/><br/>
          Asking "really?" is not being negative. It's being the smartest person in the room.
        </p>
      </div>
    </div>
  );
}

              <div>
                <div style={{fontFamily:C.mono,fontSize:12,fontWeight:700,color:C.text,marginBottom:2}}>{src.name}</div>

// ── ROOT APP ──────────────────────────────────────────────────────────────────
